    <h1>
        <img src="ノイズアイコン.png"  style="margin:0; display:inline-block;">

        Mad.Medal.Institute.Corporation
    </h1>

    <p class="img-left" style="text-align:left; margin:0;">

    <h2>今回の材質</h2>
    <p id="fortune">ここに結果が出ます</p>

    <!-- Quiz UI -->
    <div id="quiz-box">
        <h2 id="progress"></h2>
        <div id="question-text"></div>
        <ul id="options-list"></ul>
        <div id="feedback-box" style="display: none;"></div>
        <button id="next-button" style="display: none;" onclick="nextQuestion()">次へ</button>
    </div>

    <div id="score-box" style="display: none;">
        <h2>研究完了</h2>
        <p id="final-score"></p>
        <button onclick="restartQuiz()">再検証</button>
    </div>

    <audio id="bg-audio" src="Hum_Noise.mp3" preload="auto" loop playsinline></audio>
    <button id="play-audio-button" style="display:none;">音声を再生する</button>

    <script>
  console.log("M.M.I.C.Console");

  const fortunes = ["亜鉛。ダイカストなどに利用される", "ポリカ。制圧装備に利用される。", "チタン。硬く軽いが加工に難がある。", "ABS。アクリロニトリル（A）、ブタジエン（B）、スチレン（S）の3種類の成分を組み合わせた合成樹脂。LEGO©などにも利用されている。", "ベークライト。最初のプラスチック","スターリングシルバー。魔除けの性質を持つ","真鍮。古来より邪気を払い、幸運や精神的な活力を呼び込む「魔除けの金属」として親しまれてきた。","ブロンズ 「古代の叡智」「強固な守護」「霊魂との交信」を象徴する、非常に歴史の古い神聖な金属","アルミ。地球上で最も豊富に存在する金属元素の一つです。軽くて加工しやすく、電気や熱をよく伝えるため、飲料缶から航空機まで幅広い用途で活用されている。","。鉄に炭素を添加して強度と硬度を向上させた金属素材。","コルタン。コンゴにて紛争や違法労働を引き起こしている「悪魔の石」","タングステン。すべての金属の中で最も高い融点（3,400℃）を持つ金属。","メタルコンポジット。金属基複合材料 / MMC：Metal Matrix Composite)の事であり、ベースとなる金属（マトリックス/母材）の中に、異種材料（主にセラミックスや炭素繊維などの強化材）を溶け込ませて一体化させた先進材料。","冷たい鉄。「妖精、悪霊、魔術を完全に無効化する最強の防壁」として恐れられ、崇められてきた特別な金属。真鍮やブロンズが魔術的なエネルギーを「増幅・調和」させるのに対し、冷たい鉄はあらゆる超自然的な力を「拒絶・消滅」させる真逆の性質を持つ。"];
  const index = Math.floor(Math.random() * fortunes.length);
  const result = fortunes[index];

  console.log(result);

  // HTML の id="fortune" の要素を取り出して中身を書き換える
  document.getElementById("fortune").textContent = result;

// 【クイズデータ】問題、選択肢、正解インデックス（0から始まる）、解説
const quizData = [
    {
        question: "直径",
        options: ["φ40mm", "φ50mm", "φ25mm", "φ70mm"],
        answer: 0,
        rationale: "直径は円の中心から円周までの距離を2倍した長さで、φ40mmは一般的なメダルのサイズとしてよく使用されます。"
    },
    {
        question: "厚さ",
        options: ["t2mm", "t4mm", "t7mm", "t10mm"],
        answer: 2,
        rationale: "厚さはメダルの奥行きを示すもので、一般的には7mmがよく使用されます。"
    }
];

let currentQuestionIndex = 0;
let score = 0;

// クイズの表示更新
function loadQuiz() {
    resetState();
    
    const currentQuiz = quizData[currentQuestionIndex];
    // id部にデータを注入
    document.getElementById("progress").innerText = `問題 ${currentQuestionIndex + 1} / ${quizData.length}`;
    document.getElementById("question-text").innerHTML = currentQuiz.question;
    
    // 選択肢ボタンを動的に作成して ul (id="options-list") に追加
    currentQuiz.options.forEach((option, index) => {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.innerText = option;
        button.onclick = () => selectAnswer(index);
        li.appendChild(button);
        document.getElementById("options-list").appendChild(li);
    });
}

// 表示の初期化
function resetState() {
    document.getElementById("feedback-box").style.display = "none";
    document.getElementById("next-button").style.display = "none";
    document.getElementById("options-list").innerHTML = "";
}

// 回答が選択されたときの正誤判定処理
function selectAnswer(selectedIndex) {
    const currentQuiz = quizData[currentQuestionIndex];
    const feedbackBox = document.getElementById("feedback-box");
    
    // 二重クリック防止のため、すべての選択肢ボタンを無効化
    const buttons = document.querySelectorAll("#options-list button");
    buttons.forEach(btn => btn.disabled = true);
    
    // 正誤判定と解説の表示
    if (selectedIndex === currentQuiz.answer) {
        score++;
        feedbackBox.innerText = `正解\n\n解説: ${currentQuiz.rationale}`;
    } else {
        feedbackBox.innerText = `不正解：正解：「${currentQuiz.options[currentQuiz.answer]}」でした。\n\n解説: ${currentQuiz.rationale}`;
    }
    
    feedbackBox.style.display = "block";
    document.getElementById("next-button").style.display = "inline-block";
}

// 次の問題へ進む、または結果を表示する処理
function nextQuestion() {
    currentQuestionIndex++;
    
    if (currentQuestionIndex < quizData.length) {
        loadQuiz();
    } else {
        // 全問終了したらクイズ画面を隠し、結果画面を表示
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("score-box").style.display = "block";
        document.getElementById("final-score").innerText = `${quizData.length}問中、${score}問正解`;
    }
}

// クイズを最初からやり直す処理
function restartQuiz() {
    currentQuestionIndex = 0;
    score = 0;
    document.getElementById("quiz-box").style.display = "block";
    document.getElementById("score-box").style.display = "none";
    loadQuiz();
}

// ページ読み込み時にクイズを開始
function tryPlayAudio() {
    const audio = document.getElementById('bg-audio');
    const button = document.getElementById('play-audio-button');
    if (!audio) return;

    audio.volume = 0.5;
    const playPromise = audio.play();
    if (playPromise !== undefined) {
        playPromise.catch(() => {
            if (button) {
                button.style.display = 'inline-block';
            }
        });
    }
}

window.addEventListener('load', () => {
    loadQuiz();
    tryPlayAudio();
});

const playButton = document.getElementById('play-audio-button');
if (playButton) {
    playButton.addEventListener('click', () => {
        const audio = document.getElementById('bg-audio');
        if (audio) {
            audio.play();
            playButton.style.display = 'none';
        }
    });
}



const diceResults = [];
const madnessEffects = [
  "ショック", "パニック", "ヒステリー", "会話機能の低下", "恐怖症",
  "破壊衝動", "錯覚", "反響", "フェティッシュ", "カタトニア"
];

// カウント用の変数
let criticalCount = 0;
let fumbleCount = 0;

// 発生した狂気の名前だけを記録する配列
const occurredMadness = [];

// 100回振る
for (let i = 0; i < 100; i++) {
  const roll = Math.floor(Math.random() * 100) + 1;
  
  if (roll <= 6) {
    diceResults.push(`${roll}：クリティカル`);
    criticalCount++;
  } 
  else if (roll >= 96) {
    const fumbleRoll = Math.floor(Math.random() * 10);
    const effect = madnessEffects[fumbleRoll];
    
    diceResults.push(`${roll}：ファンブル：${effect}`);
    occurredMadness.push(effect); // 発生した狂気をリストに追加
    fumbleCount++;
  } 
  else {
    diceResults.push(`${roll}`);
  }
}

// --- 出力処理 ---

console.log("【ダイス結果】", diceResults);
console.log(`【判定結果】クリティカル: ${criticalCount}回、ファンブル: ${fumbleCount}回`);

// ★追加：ファンブルにより出た狂気を表示する項目
console.log("【発生した狂気】");
if (occurredMadness.length > 0) {
  // 配列の中身をカンマ区切りで綺麗に繋げて表示する
  console.log(occurredMadness.join("、"));
} else {
  console.log("なし");
}

// 相殺の計算ロジック
if (criticalCount > 0 && fumbleCount > 0) {
  const offset = Math.min(criticalCount, fumbleCount);
  const finalCritical = criticalCount - offset;
  const finalFumble = fumbleCount - offset;
  
  console.log(`【相殺結果】相殺: ${offset}`);
  
  if (finalCritical > 0) {
    console.log(`残った結果：クリティカル ${finalCritical}`);
  } else if (finalFumble > 0) {
    console.log(`残った結果：ファンブル ${finalFumble}`);
  } else {
    console.log("残った結果：すべて相殺されました");
  }
} else {
  console.log("【相殺結果】相殺なし");
}


</script>
