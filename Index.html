<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>M.M.I.C.ホーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <style>

        h1
        {
        /* Boldを優先的に指定し、環境にない場合の代替フォントも並べます */
        font-family: "Copperplate Gothic Bold", "Copperplate", serif;
        font-weight: bold; /* 念のため太字指定を明示 */
        background:linear-gradient(90deg, #1d50a2 0% , #51318f 15%, #b7180c 50%);
	    -webkit-background-clip: text;
	    background-clip: text;
	    color:transparent;
	    font-weight: bold;

            }

        *
        {
        /* Boldを優先的に指定し、環境にない場合の代替フォントも並べます */
        font-family: "Copperplate Gothic Bold", "Copperplate", serif;
        font-weight: bold; /* 念のため太字指定を明示 */
            }

        #char-display {
        font-family: "Copperplate Gothic Bold", "Copperplate", serif;
        font-weight: bold;
        text-transform: uppercase; /* 小文字が入力されても大文字で表示 */
    }

    </style>

    <h1>
        Mad.Medal.Institute.Corporation
    </h1>

    <p class="img-left" style="text-align:left; margin:0;">
        <img src="image.png" alt="QRコード" style="margin:0; display:inline-block;">
    </p>

    <a class="target-link black" href="https://asterisk-morgan.github.io/Medal_Atelier_Creater/">
        メダル工房
    </a>
   

    <h2>今日の材質</h2>
    <p id="fortune">ここに結果が出ます</p>

    
    
<script>
  const fortunes = ["亜鉛", "ポリカ", "チタン", "ABS", "ベークライト","スターリングシルバー","ABS","ベークライト","真鍮","ブロンズ","アルミ","炭素合金","コルタン","タングステン","コンポジット"];
  const index = Math.floor(Math.random() * fortunes.length);
  const result = fortunes[index];

  console.log(result);

  // HTML の id="fortune" の要素を取り出して中身を書き換える
  document.getElementById("fortune").textContent = result;
</script>
</body>
</html>
